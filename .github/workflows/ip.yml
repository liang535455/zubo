name: FOFA IP

# 触发条件配置
on:
  # 【自动触发】定时任务 - 目前已注释掉
  # schedule:
  #   - cron: "*/10 * * * *"  # 这里的含义是每 10 分钟自动运行一次

  # 【手动触发】允许你在 GitHub Actions 页面点击 "Run workflow" 手动运行
  workflow_dispatch:

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2. 安装 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. 安装脚本需要的依赖库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 安装多媒体处理工具 ffmpeg（常用于验证直播源有效性）
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 5. 执行核心抓取脚本
      - name: Run fofa_fetch.py
        run: python fofa_fetch.py

      # 6. 将脚本生成的结果文件自动提交并推送回 GitHub 仓库
      - name: Commit and push changes
        run: |
          # 配置 Git 机器人信息
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          
          # 添加变化的文件（计数、IP文件夹、IPTV列表）
          git add 计数.txt
          git add ip/*.txt || true
          git add IPTV.txt || true
          
          # 提交更改，如果没有文件变动则跳过
          git commit -m "自动更新：计数、IP文件、IPTV.txt" || echo "⚠️ 无需提交"
          
          # 推送到主分支
          git push origin main || echo "⚠️ 推送失败"
